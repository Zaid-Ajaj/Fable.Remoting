init:
  - git config --global core.autocrlf input

build:
  verbosity: detailed

environment:
  nodejs_version: "24.15.0"

os: Visual Studio 2022

# Install scripts. (runs after repo cloning)
install:
  - ps: Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -UseBasicParsing -OutFile "$env:temp\dotnet-install.ps1"
  - ps: "$env:temp\\dotnet-install.ps1" -Architecture x64 -Version '10.0.100' -InstallDir "$env:ProgramFiles\dotnet"
  - ps: dotnet --version
  - ps: Install-Product node $env:nodejs_version

  # # Update npm
  # # There seems to be issues with npm 5.4 in Windows
  # # See https://github.com/npm/npm/issues/18380
  # - npm install -g npm@6.1.0

build_script:
  - cmd: dotnet tool restore
  - cmd: dotnet run --project ./build/Build.fsproj -- BuildRunAllTests
  - cmd: dotnet run --project ./build/Build.fsproj -- IntegrationTests

test: off